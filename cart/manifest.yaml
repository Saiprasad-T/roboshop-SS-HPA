apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
data:
   REDIS_HOST: redis
   CATALOGUE_HOST: catalogue
   CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: cart
  replicas: 1
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: cart   
    spec:
      containers:
        - name: cart
          image: saithota9/cart:1.0.0
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "10m"
              memory: "40Mi"
            limits:
              cpu: "40m"
              memory: "70Mi"
          # readinessProbe:
          #   httpGet:
          #     path: /health
          #     port: 8080
          #   initialDelaySeconds: 10
          #   periodSeconds: 5
          # livenessProbe:
          #   # httpGet:
          #   #   path: /health
          #   #   port: 8080
          #   tcpSocket:
          #     port: 8080
          #   initialDelaySeconds: 20
          #   periodSeconds: 10
          envFrom:
            - configMapRef:
                name: cart
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cart-hpa
  namespace: roboshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cart  # Must match your Deployment name
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 90  # Target 50% CPU usage
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 90 # Target 70% Memory usage
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart 
spec:
  selector:
    project: roboshop
    tier: backend
    component: cart 
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080