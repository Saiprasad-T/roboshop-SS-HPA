apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue
  replicas: 1
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue   
    spec:
      containers:
        - name: catalogue
          image: saithota9/catalogue:1.0.0
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "5m"
              memory: "40Mi"
            limits:
              cpu: "40m"
              memory: "70Mi"
          readinessProbe:
            # httpGet:
            #   path: /health
            #   port: 8080
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            # httpGet:
            #   path: /health
            #   port: 8080
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: catalogue
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalogue-hpa
  namespace: roboshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalogue  # Must match your Deployment name
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 20  # Target 50% CPU usage
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 20 # Target 70% Memory usage

---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue 
spec:
  selector:
    project: roboshop
    tier: backend
    component: catalogue 
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080